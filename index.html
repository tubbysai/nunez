<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Whackin' Danny</title>
<style>
  :root {
    --wood: #8a5a34;
    --wood-dark: #5f3b1f;
  }
  * { box-sizing: border-box; }
  html, body {
    width: 100%;
    margin: 0;
    padding: 0;
  }
  body {
    min-height: 100vh;
    min-height: 100dvh;
    background: radial-gradient(circle at top, #3a2b52 0%, #1b1330 60%, #0d0918 100%);
    font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #fff;
    overflow-x: hidden;
    cursor: default;
    user-select: none;
    -webkit-user-select: none;
  }
  h1 {
    margin: 14px 0 2px;
    font-size: clamp(28px, 6vw, 46px);
    text-align: center;
    text-shadow: 3px 3px 0 #ff6a00, -2px -2px 0 #ffd166;
    letter-spacing: 1px;
  }
  .subtitle {
    margin-bottom: 8px;
    opacity: 0.85;
    font-size: 14px;
    text-align: center;
    padding: 0 12px;
  }
  .hud {
    display: flex;
    gap: 22px;
    background: rgba(0,0,0,0.35);
    padding: 8px 22px;
    border-radius: 16px;
    margin-bottom: 12px;
    font-size: 18px;
    font-weight: bold;
    border: 2px solid #ffd166;
  }
  .hud span { color: #ffd166; }
  #taunt {
    min-height: 26px;
    font-size: 18px;
    font-weight: bold;
    color: #7CFC9E;
    text-shadow: 1px 1px 2px #000;
    margin-bottom: 6px;
    text-align: center;
    padding: 0 10px;
  }
  .board {
    position: relative;
    background: linear-gradient(180deg, var(--wood), var(--wood-dark));
    border: 10px solid #3d2513;
    border-radius: 24px;
    padding: 24px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    box-shadow: 0 12px 0 #2a180c, 0 20px 30px rgba(0,0,0,0.6);
  }
  .hole {
    position: relative;
    width: 26vw;
    height: 26vw;
    max-width: 130px;
    max-height: 130px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 40%, #1a1a1a 0%, #000 70%);
    box-shadow: inset 0 8px 14px rgba(0,0,0,0.9), inset 0 -4px 8px rgba(255,255,255,0.05);
    overflow: hidden;
    cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10"></svg>') 5 5, pointer;
  }
  .danny {
    position: absolute;
    left: 50%;
    bottom: -100%;
    width: 78%;
    aspect-ratio: 640/773;
    transform: translateX(-50%);
    transition: bottom 0.18s cubic-bezier(.34,1.56,.64,1);
    border-radius: 46% 46% 40% 40% / 50% 50% 35% 35%;
    overflow: hidden;
    box-shadow: 0 0 0 4px #ffd166, 0 6px 14px rgba(0,0,0,0.6);
  }
  .danny img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 15%;
    display: block;
    pointer-events: none;
  }
  .hole.up .danny {
    bottom: 6%;
  }
  .hole.whacked .danny {
    bottom: -10% !important;
    filter: brightness(0.6);
    transform: translateX(-50%) rotate(8deg) scale(0.9);
    transition: all 0.15s ease-out;
  }
  .bonk {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%) scale(0.5) rotate(-15deg);
    font-size: 26px;
    font-weight: 900;
    color: #fff200;
    -webkit-text-stroke: 2px #b30000;
    opacity: 0;
    pointer-events: none;
    z-index: 5;
  }
  .hole.pop-anim .bonk {
    animation: bonkPop 0.5s ease-out forwards;
  }
  @keyframes bonkPop {
    0% { opacity: 0; transform: translateX(-50%) scale(0.3) rotate(-15deg); }
    30% { opacity: 1; transform: translateX(-50%) scale(1.2) rotate(-8deg); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-30px) scale(1) rotate(5deg); }
  }
  .hammer {
    position: fixed;
    width: 70px;
    height: 70px;
    pointer-events: none;
    z-index: 999;
    transform-origin: 80% 80%;
    transform: translate(-20%, -70%) rotate(0deg);
    font-size: 60px;
    display: none;
  }
  .hammer.swing {
    animation: swing 0.18s ease-out;
  }
  @keyframes swing {
    0% { transform: translate(-20%, -70%) rotate(-40deg); }
    50% { transform: translate(-20%, -70%) rotate(35deg); }
    100% { transform: translate(-20%, -70%) rotate(0deg); }
  }
  .controls {
    margin: 16px 0 6px;
    display: flex;
    gap: 12px;
  }
  button {
    font-family: inherit;
    font-size: 16px;
    font-weight: bold;
    padding: 10px 22px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(180deg, #ff8a00, #ff5e00);
    color: #fff;
    cursor: pointer;
    box-shadow: 0 4px 0 #a83e00;
  }
  button:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 #a83e00;
  }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    text-align: center;
    padding: 20px;
  }
  .overlay.show { display: flex; }
  .card {
    background: linear-gradient(160deg, #2a1b45, #150c26);
    border: 3px solid #ffd166;
    border-radius: 20px;
    padding: 28px 24px;
    max-width: 340px;
  }
  .card h2 {
    margin-top: 0;
    font-size: 30px;
    text-shadow: 2px 2px 0 #ff6a00;
  }
  .card p { font-size: 16px; line-height: 1.4; }
  footer {
    margin: 14px 0 30px;
    font-size: 12px;
    opacity: 0.5;
    text-align: center;
    padding: 0 20px;
  }
</style>
</head>
<body>

<h1>🔨 WHACKIN' DANNY 🔨</h1>
<div class="subtitle">He keeps popping up where he's not wanted. Sound familiar?</div>

<div class="hud">
  <div>Score: <span id="score">0</span></div>
  <div>Time: <span id="time">30</span>s</div>
  <div>Best: <span id="best">0</span></div>
</div>

<div id="taunt">&nbsp;</div>

<div class="board" id="board"></div>

<div class="controls">
  <button id="startBtn">Start Game</button>
</div>

<footer>No actual Dannys were harmed. Mostly.</footer>

<div class="hammer" id="hammer">🔨</div>

<div class="overlay" id="overlay">
  <div class="card">
    <h2 id="overTitle">Time's Up!</h2>
    <p id="overText">You whacked Danny <span id="finalScore">0</span> times.</p>
    <p id="overComment" style="color:#ffd166; font-weight:bold;"></p>
    <button id="againBtn">Whack Again</button>
  </div>
</div>

  low: "Danny's out here dodging hammers like he dodges the dinner bill.",
  mid: "Solid effort — Danny's still cocky though.",
  high: "Legendary. Danny needs a helmet from now on.",
};

let score = 0, best = 0, timeLeft = GAME_TIME, timerId = null, spawnId = null, playing = false;
let activeHoles = new Set();

const board = document.getElementById('board');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const timeEl = document.getElementById('time');
const tauntEl = document.getElementById('taunt');
const startBtn = document.getElementById('startBtn');
const overlay = document.getElementById('overlay');
const againBtn = document.getElementById('againBtn');
const finalScoreEl = document.getElementById('finalScore');
const overComment = document.getElementById('overComment');
const hammer = document.getElementById('hammer');

try {
  const savedBest = localStorage.getItem('whackinDannyBest');
  if (savedBest) { best = parseInt(savedBest, 10) || 0; }
} catch (e) {}
bestEl.textContent = best;

function buildBoard() {
  board.innerHTML = '';
  for (let i = 0; i < HOLE_COUNT; i++) {
    const hole = document.createElement('div');
    hole.className = 'hole';
    hole.dataset.index = i;
    hole.innerHTML = `
      <div class="danny">
        <img src="${DANNY_SRC}" alt="Danny" draggable="false">
      </div>
      <div class="bonk">BONK!</div>
    `;
    hole.addEventListener('pointerdown', (e) => whack(hole, e));
    board.appendChild(hole);
  }
}
buildBoard();

function randomTaunt() {
  tauntEl.textContent = taunts[Math.floor(Math.random() * taunts.length)];
}

function popRandomDanny() {
  if (!playing) return;
  const holes = Array.from(board.children).filter(h => !activeHoles.has(h));
  if (holes.length === 0) return;
  const hole = holes[Math.floor(Math.random() * holes.length)];
  activeHoles.add(hole);
  hole.classList.remove('whacked');
  hole.classList.add('up');
  if (Math.random() < 0.35) randomTaunt();

  const upTime = 550 + Math.random() * 550;
  hole._timeout = setTimeout(() => {
    hole.classList.remove('up');
    activeHoles.delete(hole);
  }, upTime);
}

function scheduleSpawns() {
  spawnId = setInterval(() => {
    if (!playing) return;
    const burst = Math.random() < 0.25 ? 2 : 1;
    for (let i = 0; i < burst; i++) popRandomDanny();
  }, 620);
}

function whack(hole, e) {
  if (!playing) return;
  triggerHammer(e);
  if (!hole.classList.contains('up') || hole.classList.contains('whacked')) return;
  clearTimeout(hole._timeout);
  hole.classList.add('whacked');
  hole.classList.add('pop-anim');
  setTimeout(() => hole.classList.remove('pop-anim'), 500);
  activeHoles.delete(hole);
  setTimeout(() => {
    hole.classList.remove('up');
    hole.classList.remove('whacked');
  }, 200);

  score++;
  scoreEl.textContent = score;
  tauntEl.textContent = hitComments[Math.floor(Math.random() * hitComments.length)];
}

function triggerHammer(e) {
  const x = e.clientX ?? (e.touches && e.touches[0].clientX) ?? window.innerWidth / 2;
  const y = e.clientY ?? (e.touches && e.touches[0].clientY) ?? window.innerHeight / 2;
  hammer.style.display = 'block';
  hammer.style.left = x + 'px';
  hammer.style.top = y + 'px';
  hammer.classList.remove('swing');
  void hammer.offsetWidth;
  hammer.classList.add('swing');
}

document.addEventListener('pointermove', (e) => {
  if (hammer.style.display === 'block') {
    hammer.style.left = e.clientX + 'px';
    hammer.style.top = e.clientY + 'px';
  }
});

function startGame() {
  score = 0;
  timeLeft = GAME_TIME;
  scoreEl.textContent = score;
  timeEl.textContent = timeLeft;
  overlay.classList.remove('show');
  playing = true;
  tauntEl.textContent = "Here he comes...";
  startBtn.textContent = 'Restart';
  hammer.style.display = 'block';

  clearInterval(timerId);
  clearInterval(spawnId);
  timerId = setInterval(() => {
    timeLeft--;
    timeEl.textContent = timeLeft;
    if (timeLeft <= 0) endGame();
  }, 1000);
  scheduleSpawns();
}

function endGame() {
  playing = false;
  clearInterval(timerId);
  clearInterval(spawnId);
  activeHoles.forEach(hole => {
    clearTimeout(hole._timeout);
    hole.classList.remove('up');
  });
  activeHoles.clear();

  if (score > best) {
    best = score;
    bestEl.textContent = best;
    try { localStorage.setItem('whackinDannyBest', String(best)); } catch (e) {}
  }

  finalScoreEl.textContent = score;
  let comment;
  if (score < 10) comment = endComments.low;
  else if (score < 22) comment = endComments.mid;
  else comment = endComments.high;
  overComment.textContent = comment;
  overlay.classList.add('show');
}

startBtn.addEventListener('click', startGame);
againBtn.addEventListener('click', startGame);
</script>
</body>
</html>
